server:
  port: ${TICKET_MCP_SERVER_PORT:9006}

spring:
  application:
    name: index12306-ticket-mcp-server
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:192.168.126.100:8848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
  ai:
    mcp:
      server:
        enabled: true
        protocol: STATELESS
        name: index12306-ticket-mcp-server
        version: 0.0.1
        type: SYNC
        instructions: 仅向内部购票智能体提供经过授权的票务能力。
        request-timeout: 20s
        capabilities:
          resource: false
          tool: true
          prompt: false
          completion: false
        annotation-scanner:
          enabled: true
        stateless:
          mcp-endpoint: /mcp
          disallow-delete: true

index12306:
  agent:
    mcp:
      internal-secret: ${TICKET_MCP_INTERNAL_SECRET:}
      allowed-clock-skew: 2m
      ticket-service-url: ${TICKET_SERVICE_URL:http://127.0.0.1:9002}
      user-service-url: ${USER_SERVICE_URL:http://127.0.0.1:9001}
      order-service-url: ${ORDER_SERVICE_URL:http://127.0.0.1:9003}
      connect-timeout: 3s
      read-timeout: 20s
      station-result-limit: 10
      ticket-result-limit: 20
      passenger-result-limit: 30
      order-page-size-limit: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
