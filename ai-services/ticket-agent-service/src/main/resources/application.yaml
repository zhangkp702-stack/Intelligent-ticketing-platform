server:
  port: ${TICKET_AGENT_SERVER_PORT:9005}

spring:
  application:
    name: index12306-ticket-agent-service
  datasource:
    url: ${AGENT_DATASOURCE_URL:jdbc:mysql://192.168.126.100/12306_agent?characterEncoding=utf8&useUnicode=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${AGENT_DATASOURCE_USERNAME:root}
    password: ${AGENT_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 3000
      maximum-pool-size: 16
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:192.168.126.100:8848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
  ai:
    mcp:
      client:
        enabled: ${TICKET_MCP_CLIENT_ENABLED:true}
        name: index12306-ticket-agent-mcp-client
        version: 0.0.1
        type: SYNC
        request-timeout: 20s
        toolcallback:
          # 原始 MCP 工具禁止自动注册；工具由签名、白名单和审计包装器安全注册。
          enabled: false
        streamable-http:
          connections:
            ticket:
              url: ${TICKET_MCP_SERVER_URL:http://127.0.0.1:9006}
              endpoint: /mcp

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

index12306:
  agent:
    chat:
      response-timeout: 60s
    action:
      confirmation-secret: ${TICKET_AGENT_CONFIRMATION_SECRET:${TICKET_MCP_INTERNAL_SECRET:}}
      confirmation-ttl: 5m
    mcp:
      internal-secret: ${TICKET_MCP_INTERNAL_SECRET:}
    memory:
      topic-candidate-limit: 6
      topic-route-confidence-threshold: 0.55
      recent-user-question-limit: 6
      recent-message-limit: 16
      context-token-budget: 12000
      summary-trigger-message-count: 12
      summary-max-attempts: 3
      summary-retry-delay: 30s
      summary-lease-duration: 2m
      summary-auto-dispatch-enabled: true
      summary-executor:
        core-pool-size: 2
        max-pool-size: 4
        queue-capacity: 200
        await-termination: 20s
    model:
      attempt-timeout: 20s
      total-timeout: 50s
      acquire-timeout: 50ms
      failure-threshold: 3
      open-duration: 30s
      audit-capacity: 200
      providers:
        bailian:
          enabled: ${BAILIAN_ENABLED:true}
          base-url: ${BAILIAN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
          api-key: ${BAILIAN_API_KEY:}
          completions-path: /v1/chat/completions
          connect-timeout: 3s
          read-timeout: 20s
          max-concurrent: 8
        siliconflow:
          enabled: ${SILICONFLOW_ENABLED:true}
          base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn}
          api-key: ${SILICONFLOW_API_KEY:}
          completions-path: /v1/chat/completions
          connect-timeout: 3s
          read-timeout: 20s
          max-concurrent: 8
      candidates:
        bailian-answer-primary:
          provider: bailian
          model: qwen3.5-plus-2026-02-15
          capabilities: [CHAT, TOOL_CALLING, STRUCTURED_OUTPUT, STREAMING]
          temperature: 0.2
          max-tokens: 4096
        siliconflow-answer-secondary:
          provider: siliconflow
          model: Qwen/Qwen3.6-35B-A3B
          capabilities: [CHAT, TOOL_CALLING, STRUCTURED_OUTPUT, STREAMING]
          temperature: 0.2
          max-tokens: 4096
          extra-body:
            enable_thinking: false
        siliconflow-answer-tertiary:
          provider: siliconflow
          model: Qwen/Qwen3-32B
          capabilities: [CHAT, TOOL_CALLING, STRUCTURED_OUTPUT, STREAMING]
          temperature: 0.2
          max-tokens: 4096
          extra-body:
            enable_thinking: false
        bailian-flash:
          provider: bailian
          model: qwen3.5-flash-2026-02-23
          capabilities: [CHAT, TOOL_CALLING, STRUCTURED_OUTPUT, STREAMING]
          temperature: 0.1
          max-tokens: 3072
        siliconflow-summary-primary:
          provider: siliconflow
          model: Qwen/Qwen3.5-9B
          capabilities: [CHAT, STRUCTURED_OUTPUT, STREAMING]
          temperature: 0.0
          max-tokens: 2048
          extra-body:
            enable_thinking: false
      routes:
        ANSWER_TOOL:
          - bailian-answer-primary
          - siliconflow-answer-secondary
          - siliconflow-answer-tertiary
          - bailian-flash
        TOPIC_ROUTE:
          - siliconflow-summary-primary
          - bailian-flash
          - siliconflow-answer-tertiary
        MEMORY_SUMMARY:
          - siliconflow-summary-primary
          - bailian-flash
          - siliconflow-answer-tertiary
        PARAMETER_REPAIR:
          - bailian-answer-primary
          - siliconflow-answer-secondary
          - bailian-flash
