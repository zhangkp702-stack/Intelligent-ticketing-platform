server:
  port: ${TICKET_AGENT_SERVER_PORT:9005}

spring:
  application:
    name: index12306-ticket-agent-service
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
  ai:
    mcp:
      client:
        enabled: false
        name: index12306-ticket-agent-mcp-client
        version: 0.0.1
        type: SYNC
        request-timeout: 20s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

index12306:
  agent:
    providers:
      bailian:
        base-url: ${BAILIAN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
        api-key: ${BAILIAN_API_KEY:}
      siliconflow:
        base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn}
        api-key: ${SILICONFLOW_API_KEY:}
