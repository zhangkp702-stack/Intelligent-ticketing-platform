spring:
  datasource:
    url: jdbc:h2:mem:agent;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    nacos:
      discovery:
        enabled: false
  ai:
    mcp:
      client:
        enabled: false

index12306:
  agent:
    action:
      confirmation-secret: test-confirmation-secret-at-least-32-characters
    memory:
      summary-auto-dispatch-enabled: false
